$mod = SUPER

# lock screen
bind = $mod, K, exec, hyprlock

# screenshots
bind = , Print, exec, grim - | wl-copy
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mod, Print, exec, grim -g "$(slurp)" ~/Pictures/$(date +%Y%m%d_%H%M%S).png

# screen recording
bind = SUPER, S, exec, wf-recorder -o $(hyprctl monitors -j | jq -r '.[] | select(.focused) | .name') -f ~/Videos/$(date +%Y%m%d_%H%M%S).mp4
bind = SUPER SHIFT, S, exec, pkill wf-recorder
bind = SUPER, E, exec, wf-recorder -g "$(slurp)" -f ~/Videos/$(date +%Y%m%d_%H%M%S).mp4
bind = SUPER SHIFT, E, exec, pkill wf-recorder

# volume
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# brightness
binde = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# media
bind = , XF86AudioPlay,  exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext,  exec, playerctl next
bind = , XF86AudioPrev,  exec, playerctl previous
bind = , XF86AudioStop,  exec, playerctl stop

# apps
bind = $mod, RETURN, exec, ghostty
bind = $mod, D, exec, wofi --show drun --style ~/.config/wofi/style.css
bind = $mod, C, exec, hyprpicker -a
bind = $mod, PERIOD, exec, bemoji -t

# clipboard history
bind = $mod, V, exec, cliphist list | wofi --dmenu --style ~/.config/wofi/style.css | cliphist decode | wl-copy
bind = $mod SHIFT, V, exec, cliphist list | wofi --dmenu --style ~/.config/wofi/style.css | cliphist delete

# bluetooth
bind = $mod, B, exec, ghostty -e bluetuith

# power menu
bind = $mod SHIFT, K, exec, wlogout --layout ~/.config/wlogout/layout --css ~/.config/wlogout/style.css -b 4 -r 1

# notifications
bind = $mod, N, exec, ags request toggle-sidebar
bind = $mod SHIFT, N, exec, ags request dismiss-all

# movement
bind = $mod, Left,  movefocus, l
bind = $mod, Right, movefocus, r
bind = $mod, Up,    movefocus, u
bind = $mod, Down,  movefocus, d

# move windows
bind = $mod SHIFT, Left,  movewindow, l
bind = $mod SHIFT, Right, movewindow, r
bind = $mod SHIFT, Up,    movewindow, u
bind = $mod SHIFT, Down,  movewindow, d

# workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# resize windows
binde = $mod ALT, Left,  resizeactive, -40 0
binde = $mod ALT, Right, resizeactive, 40 0
binde = $mod ALT, Up,    resizeactive, 0 -40
binde = $mod ALT, Down,  resizeactive, 0 40

# useful
bind = $mod, Q, killactive
bind = $mod, SPACE, togglefloating
bind = $mod, M, fullscreen, 1    # maximize/restore toggle
bind = $mod, F, fullscreen, 0    # true fullscreen toggle

# scratchpad terminal
bind = $mod, GRAVE, exec, ~/Arch-X/bin/toggle-scratchpad
windowrule = float on, match:class com.scratchpad.terminal
windowrule = size 80% 70%, match:class com.scratchpad.terminal
windowrule = center on, match:class com.scratchpad.terminal

# workspace overview (enable: hyprpm add https://github.com/hyprwm/hyprland-plugins && hyprpm enable hyprexpo)
bind = $mod, TAB, hyprexpo:expo, toggle
bind = $mod SHIFT, TAB, workspace, r+1

# startup
exec-once = ~/.config/hypr/assign-workspaces.sh
exec-once = ags run --gtk 4 -d ~/.config/ags/
exec-once = swww-daemon && swww img ~/Pictures/wallpaper.jpg
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

input {
    kb_layout = us,ru,am
    kb_variant = ,,phonetic
    kb_options = grp:alt_shift_toggle
    follow_mouse = 2
}

general {
    gaps_in = 2
    gaps_out = 6
    border_size = 1
    layout = dwindle
}

decoration {
    rounding = 4
    active_opacity = 1.0
    inactive_opacity = 0.8

    blur {
        enabled = true
        size = 3
        passes = 2
    }
}

animations {
    enabled = true
}

# monitors — auto-configured by setup-monitors.sh, fallback to auto-placement
monitor = ,preferred,auto,1
source = ~/.config/hypr-local/monitors.conf

source = ~/.config/hypr-local/gpu.conf
env = XDG_SESSION_TYPE,wayland
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_STYLE_OVERRIDE,Fusion
env = GTK_CSD,0
env = GTK_THEME,adw-gtk3-dark
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24

plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = center current
    }
}
