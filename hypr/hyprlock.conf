background {
    monitor =
    path = screenshot
    blur_passes = 2          # matches your passes = 2
    blur_size = 3            # matches your size = 3
    brightness = 0.8         # matches your inactive_opacity = 0.8
}

input-field {
    monitor =
    size = 260, 40
    outline_thickness = 1                # matches your border_size = 1
    rounding = 4                         # matches your rounding = 4
    outer_color = rgba(255, 255, 255, 0.5)
    inner_color = rgba(0, 0, 0, 0.6)
    font_color = rgb(220, 220, 220)
    placeholder_text = password
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    font_size = 48
    color = rgba(220, 220, 220, 0.9)
    position = 0, 80
    halign = center
    valign = center
}
